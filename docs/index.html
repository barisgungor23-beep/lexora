<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lexora Legal</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f8f6ef;
      --card: #fffdf7;
      --ink: #25211c;
      --muted: #5f5a50;
      --border: #c7bdab;
      --accent: #6e4c28;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", Times, serif;
      line-height: 1.65;
    }

    .page {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
      font-size: 0.98rem;
    }

    a {
      color: var(--accent);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(199, 189, 171, 0.85);
      border-radius: 14px;
      padding: clamp(24px, 5vw, 44px);
      box-shadow: 0 10px 30px rgba(37, 33, 28, 0.05);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.2rem, 8vw, 4rem);
      line-height: 1.05;
      font-weight: 500;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 1.08rem;
    }

    .links {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    .links a {
      display: block;
      padding: 16px 18px;
      border: 1px solid rgba(199, 189, 171, 0.9);
      border-radius: 12px;
      background: rgba(248, 246, 239, 0.7);
      color: var(--ink);
      text-decoration: none;
    }

    .links span {
      display: block;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <nav aria-label="Legal navigation">
      <a href="./">Home</a>
      <a href="./privacy-policy.html">Privacy Policy</a>
      <a href="./terms-of-use.html">Terms of Use</a>
    </nav>

    <section class="card">
      <h1>Lexora Legal</h1>
      <p>Legal information for Lexora, a calm daily word discovery app.</p>

      <div class="links" aria-label="Legal pages">
        <a href="./privacy-policy.html">Privacy Policy <span>How Lexora handles privacy, local data, purchases, and notifications.</span></a>
        <a href="./terms-of-use.html">Terms of Use <span>The terms that govern personal use of Lexora.</span></a>
      </div>
    </section>
  </main>
</body>
</html>
